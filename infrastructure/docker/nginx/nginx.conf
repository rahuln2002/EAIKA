events {}

http {

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {

        listen 80;

        # =============================================
        # FRONTEND
        # =============================================

        location / {
            proxy_pass http://frontend;
        }

        # =============================================
        # BACKEND API
        # =============================================

        location /api/ {
            proxy_pass http://backend;
        }

        # =============================================
        # WEBSOCKETS
        # =============================================

        location /ws/ {
            proxy_pass http://backend;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;

            proxy_set_header Connection "Upgrade";
        }
    }
}
